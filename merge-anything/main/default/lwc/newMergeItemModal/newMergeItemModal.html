<template>
    <lightning-modal-header label="New Merge Item"></lightning-modal-header>
    <lightning-modal-body>
        <template lwc:if={showNewMergeItemSection}>
        <div class="slds-grid slds-grid_vertical slds-grid_vertical-align-center slds-grid_align-center slds-m-bottom_small">
            <div>
                <lightning-formatted-text class="slds-text-heading_small"
                    value="You are about to create a new Merge Item. Are you sure you want to do this?"></lightning-formatted-text>
            </div>
            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-m-top_small">
                <lightning-icon class="slds-m-right_x-small" icon-name="utility:info" alternative-text="info"
                    title="info" size="x-small"></lightning-icon>
                <lightning-formatted-text class="slds-text-color_weak"
                    value="A Merge Item represents the details of two records to be merged."></lightning-formatted-text>
            </div>
        </div>

        <div class="slds-m-bottom_small">
            <c-s-object-searchable-combobox label="Object" onitemselected={handleSObjectSelected}>
            </c-s-object-searchable-combobox>
        </div>

        <lightning-combobox
            class="slds-m-bottom_small"
            label="Saved field template (optional)"
            value={_templateId}
            options={fieldTemplateOptions}
            onchange={handleTemplatePick}
            disabled={recordsComboboxDisabled}
        ></lightning-combobox>

        <div class="slds-box slds-theme_default slds-m-top_medium slds-p-around_medium">
            <div class="slds-text-heading_small slds-m-bottom_small">Records</div>

            <c-record-searchable-combobox class="slds-m-bottom_small" label="Primary record"
                disabled={recordsComboboxDisabled} sobject-api-name={_sobjectApiName}
                onitemselected={handlePrimaryRecordSelected}>
            </c-record-searchable-combobox>

            <div class="slds-text-align_center slds-m-vertical_small" role="presentation">
                <lightning-icon icon-name="utility:merge" size="x-small" alternative-text="Then">
                </lightning-icon>
            </div>

            <c-record-searchable-combobox label="Secondary record" disabled={recordsComboboxDisabled}
                sobject-api-name={_sobjectApiName} onitemselected={handleSecondaryRecordSelected}>
            </c-record-searchable-combobox>

            <template lwc:if={loadingMergeFields}>
                <div class="slds-align_absolute-center slds-p-around_medium">
                    <lightning-spinner alternative-text="Loading fields" size="medium"></lightning-spinner>
                </div>
            </template>
        </div>
        </template>

        <!-- Field Merge Section -->

        <template lwc:if={showFieldMergeSection}>

            <div class="slds-grid slds-grid_vertical slds-grid_vertical-align-center slds-grid_align-center slds-m-bottom_small">
                <div class="slds-col slds-size_1-of-1">
                    <lightning-combobox
                        label="Apply saved template to field choices"
                        value={_templateId}
                        options={fieldTemplateOptions}
                        onchange={handleTemplateApplyToFields}
                    ></lightning-combobox>
                </div>
            </div>

            <div class="slds-grid slds-grid_vertical slds-grid_vertical-align-center slds-grid_align-center slds-m-bottom_small">
                <div>
                    <lightning-formatted-text class="slds-text-heading_small"
                        value="Select Fields to Merge"></lightning-formatted-text>
                </div>
                <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-m-top_small">
                </div>
            </div>
    
            <div class="slds-box slds-theme_default slds-p-around_medium">
                <div class="slds-grid slds-gutters slds-m-bottom_small slds-border_bottom slds-p-bottom_small">
                    <div class="slds-col slds-size_1-of-2 slds-text-align_center">
                        <lightning-formatted-text class="slds-text-heading_small"
                            value={_primaryRecord.name}></lightning-formatted-text>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-text-align_center">
                        <lightning-formatted-text class="slds-text-heading_small"
                            value={_secondaryRecord.name}></lightning-formatted-text>
                    </div>
                </div>
                <template for:each={mergeFields} for:item="field">
                    <div key={field.apiName} class="slds-grid slds-gutters slds-p-vertical_x-small slds-border_bottom">
                        <div class="slds-col slds-size_1-of-2">
                            <div class="slds-grid slds-gutters_xx-small slds-grid_vertical-align-center">
                                <div class="slds-col slds-size_2-of-12 slds-grid slds-grid_align-center">
                                    <lightning-input
                                        type="radio"
                                        variant="label-hidden"
                                        name={field.apiName}
                                        value="primary"
                                        checked={field.choosePrimary}
                                        data-field={field.apiName}
                                        data-source="primary"
                                        onchange={handleFieldChoice}>
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_10-of-12 slds-grid slds-grid_vertical-align-center">
                                    <span class="slds-text-body_small slds-text-color_weak slds-p-right_x-small">{field.label}</span>
                                    <span class="slds-border_left slds-p-left_small slds-text-body_regular">{field.primaryValue}</span>
                                </div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <div class="slds-grid slds-gutters_xx-small slds-grid_vertical-align-center">
                                <div class="slds-col slds-size_2-of-12 slds-grid slds-grid_align-center">
                                    <lightning-input
                                        type="radio"
                                        variant="label-hidden"
                                        name={field.apiName}
                                        value="secondary"
                                        checked={field.chooseSecondary}
                                        data-field={field.apiName}
                                        data-source="secondary"
                                        onchange={handleFieldChoice}>
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_10-of-12 slds-grid slds-grid_vertical-align-center">
                                    <span class="slds-text-body_small slds-text-color_weak slds-p-right_x-small">{field.label}</span>
                                    <span class="slds-border_left slds-p-left_small slds-text-body_regular">{field.secondaryValue}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="slds-m-top_medium slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12">
                    <lightning-input
                        label="Template description (when saving)"
                        value={_templateDescription}
                        onchange={handleTemplateDescriptionChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-align-bottom">
                    <lightning-button
                        label="Save as template"
                        variant="neutral"
                        disabled={finishDisabled}
                        onclick={handleSaveAsTemplate}
                    ></lightning-button>
                </div>
            </div>
        </template>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
        <lightning-button class="slds-m-left_xx-small" label="Back" variant="neutral" onclick={handleBack}></lightning-button>
        <template lwc:if={showFieldMergeSection}>
            <lightning-button class="slds-m-left_xx-small" label="Finish" variant="brand"
                disabled={finishDisabled} onclick={handleFinish}></lightning-button>
        </template>
        <template lwc:else>
            <lightning-button class="slds-m-left_xx-small" label="Continue" variant="brand"
                disabled={continueDisabled} onclick={handleContinue}></lightning-button>
        </template>
    </lightning-modal-footer>
</template>
