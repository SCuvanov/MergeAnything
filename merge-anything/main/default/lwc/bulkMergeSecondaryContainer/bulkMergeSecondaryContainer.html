<template>
  <lightning-card>
    <div class="slds-m-left_medium slds-m-right_medium">
      <template lwc:if={_mergeJob}>
        <div>
          <div class="slds-text-heading_medium" style="font-weight: var(--lwc-fontWeightLight)">
            <lightning-formatted-text value="Merge Job Details"></lightning-formatted-text>
          </div>
          <div class="slds-border_bottom slds-m-top_small"></div>
          <div class="slds-text-heading_medium slds-m-top_small" style="font-weight: var(--lwc-fontWeightBold)">
            <lightning-formatted-text value={_mergeJobName}></lightning-formatted-text>
          </div>
          <div class="slds-text-heading_small slds-m-top_xx-small" style="font-weight: var(--lwc-fontWeightLight)">
            <lightning-formatted-text class="slds-text-color_weak" value={_mergeJobId}></lightning-formatted-text>
          </div>
          <div class="slds-text-heading_small slds-m-top_xx-small" style="font-weight: var(--lwc-fontWeightLight)">
            <lightning-formatted-text class="slds-text-color_success"
              value={_mergeJobStatus}></lightning-formatted-text>
          </div>
        </div>
        <div class="slds-m-top_large">
          <template lwc:if={_executing}>
            <lightning-spinner alternative-text="Running merge job" size="small"
              class="slds-m-bottom_x-small"></lightning-spinner>
          </template>
          <lightning-button variant="neutral" label="Refresh" title="Refresh" icon-name="utility:refresh"
            onclick={handleRefresh} disabled={actionsDisabled}></lightning-button>
          <lightning-button variant="brand" label="Start" title="Start" icon-name="utility:play"
            class="slds-m-left_xx-small" onclick={handleStart} disabled={actionsDisabled}></lightning-button>
        </div>
        <div class="slds-m-top_medium">
          <p>PIE CHART PLACEHOLDER</p>
        </div>
      </template>
      <template lwc:else>
        <div class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-text-heading_small"
          style="margin-bottom: 1.25rem">
          <lightning-icon class="slds-m-right_small" icon-name="utility:info" alternative-text="info"
            title="info"></lightning-icon>
          <lightning-formatted-text value="Merge Job information unavailable."></lightning-formatted-text>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
