<template>
  <lightning-card>
    <div class="slds-m-left_medium slds-m-right_medium">
      <template lwc:if={_mergeJob}>
        <div>
          <div class="slds-text-heading_medium" style="font-weight: var(--lwc-fontWeightLight)">
            <lightning-formatted-text value="Merge Job Details"></lightning-formatted-text>
          </div>
          <div class="slds-border_bottom slds-m-top_small"></div>
          <div class="slds-text-heading_medium slds-m-top_small" style="font-weight: var(--lwc-fontWeightBold)">
            <template lwc:if={_mergeJobLink}>
              <lightning-formatted-url label={_mergeJobName} value={_mergeJobLink} target="_blank">
              </lightning-formatted-url>
            </template>
            <template lwc:else>
              <lightning-formatted-text value={_mergeJobName}></lightning-formatted-text>
            </template>
          </div>
          <div class="slds-text-heading_small slds-m-top_xx-small" style="font-weight: var(--lwc-fontWeightLight)">
            <lightning-formatted-text class="slds-text-color_weak" value={_mergeJobId}></lightning-formatted-text>
          </div>
          <div class="slds-text-heading_small slds-m-top_xx-small" style="font-weight: var(--lwc-fontWeightLight)">
            <lightning-formatted-text class="slds-text-color_success"
              value={_mergeJobStatus}></lightning-formatted-text>
          </div>
          <template lwc:if={mergeItemCountDisplay}>
            <div class="slds-text-body_regular slds-m-top_x-small">
              <lightning-formatted-text class="slds-text-color_weak" value={mergeItemCountDisplay}>
              </lightning-formatted-text>
            </div>
          </template>
        </div>
        <div class="slds-m-top_large">
          <template lwc:if={_executing}>
            <lightning-spinner alternative-text="Working" size="small"
              class="slds-m-bottom_x-small"></lightning-spinner>
          </template>
          <template lwc:if={showRunActions}>
            <lightning-button variant="neutral" label="Refresh" title="Refresh results for this merge job"
              icon-name="utility:refresh" onclick={handleRefresh} disabled={_executing}></lightning-button>
            <lightning-button variant="neutral" label="Preview" title="Field-level diff from stored merge data"
              icon-name="utility:preview" class="slds-m-left_xx-small" onclick={handlePreview} disabled={_executing}>
            </lightning-button>
            <lightning-button variant="neutral" label="Validate" title="Check concurrency, stale data, and test updates"
              icon-name="utility:rules" class="slds-m-left_xx-small" onclick={handleValidate}
              disabled={_executing}></lightning-button>
            <lightning-button variant="brand" label="Start" title="Run merge for pending or failed items"
              icon-name="utility:play" class="slds-m-left_xx-small" onclick={handleStart}
              disabled={startButtonsDisabled}></lightning-button>
            <lightning-button variant="brand-outline" label="Start in background"
              title="Queue chunked merge; notification when done"
              icon-name="utility:clock" class="slds-m-left_xx-small" onclick={handleStartInBackground}
              disabled={startButtonsDisabled}></lightning-button>
          </template>
          <template lwc:if={showRollbackAction}>
            <lightning-button variant="destructive" label="Rollback" title="Restore primary records and undelete secondaries"
              icon-name="utility:undo" onclick={handleRollback} disabled={_executing}></lightning-button>
          </template>
        </div>
        <div class="slds-m-top_medium">
          <p>PIE CHART PLACEHOLDER</p>
        </div>
      </template>
      <template lwc:else>
        <div class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-text-heading_small"
          style="margin-bottom: 1.25rem">
          <lightning-icon class="slds-m-right_small" icon-name="utility:info" alternative-text="info"
            title="info"></lightning-icon>
          <lightning-formatted-text value="Merge Job information unavailable."></lightning-formatted-text>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
