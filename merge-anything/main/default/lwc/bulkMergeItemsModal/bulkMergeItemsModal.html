<template>
  <lightning-modal-header label="Bulk add merge items (CSV)"></lightning-modal-header>
  <lightning-modal-body>
    <p class="slds-text-body_regular slds-m-bottom_small">
      One pair per line: <code>primaryId,secondaryId</code> (18-character Ids). All pairs must match the object you
      select below.
    </p>
    <div class="slds-m-bottom_small">
      <c-s-object-searchable-combobox label="Object" onitemselected={handleObjectSelected}>
      </c-s-object-searchable-combobox>
    </div>
    <lightning-combobox
      class="slds-m-bottom_small"
      label="Field template (optional)"
      value={_templateId}
      options={templateOptions}
      onchange={handleTemplateChange}
      disabled={templateComboboxDisabled}
    ></lightning-combobox>
    <lightning-textarea
      label="Id pairs"
      value={_csvBody}
      onchange={handleCsvChange}
      placeholder="001xxxxxxxxxxxxxxx,001yyyyyyyyyyyyyyy"
    ></lightning-textarea>
    <template lwc:if={_importing}>
      <lightning-spinner alternative-text="Importing" size="small"></lightning-spinner>
    </template>
  </lightning-modal-body>
  <lightning-modal-footer>
    <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
    <lightning-button
      class="slds-m-left_x-small"
      label="Import"
      variant="brand"
      disabled={importButtonDisabled}
      onclick={handleImport}
    ></lightning-button>
  </lightning-modal-footer>
</template>
