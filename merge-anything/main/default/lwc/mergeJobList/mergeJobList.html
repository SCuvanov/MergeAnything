<template>
    <template lwc:if={showJobLoading}>
        <div class="slds-is-relative slds-p-vertical_large">
            <lightning-spinner alternative-text="Loading merge jobs" size="small"></lightning-spinner>
        </div>
    </template>
    <template lwc:elseif={showJobError}>
        <div class="slds-text-color_error slds-p-around_medium">Unable to load merge jobs.</div>
    </template>
    <template lwc:elseif={showNoJobsAtAll}>
        <div
            class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-text-body_regular slds-p-vertical_large">
            <lightning-icon class="slds-m-right_x-small" icon-name="utility:list" alternative-text=""
                size="small"></lightning-icon>
            <lightning-formatted-text value={noJobsAtAllMessage}></lightning-formatted-text>
        </div>
    </template>
    <template lwc:else>
        <div class="merge-job-toolbar slds-m-bottom_small">
            <div class="merge-job-toolbar__row">
                <div class="merge-job-toolbar__segment">
                    <div class="merge-job-toolbar__showme">
                        <slot name="mergeViewPicker"></slot>
                    </div>
                </div>
                <div class="merge-job-toolbar__segment">
                    <div class="merge-job-toolbar__created-by">
                        <c-record-searchable-combobox
                            data-id="mergeJobCreatedByLookup"
                            label="Created By"
                            sobject-api-name="User"
                            onitemselected={handleCreatedByItemSelected}
                        ></c-record-searchable-combobox>
                    </div>
                </div>
                <div class="merge-job-toolbar__segment">
                    <div class="merge-job-toolbar__date-block">
                        <lightning-input
                            type="date"
                            label="Created Date (On or After)"
                            value={_jobDateFrom}
                            onchange={handleJobDateFromChange}
                        ></lightning-input>
                    </div>
                </div>
                <div class="merge-job-toolbar__segment merge-job-toolbar__segment--reset">
                    <lightning-button
                        variant="neutral"
                        label="Reset filters"
                        title="Clear created by user and created date (on or after)"
                        icon-name="utility:clear"
                        class="merge-job-toolbar__reset-filters"
                        onclick={handleResetJobFilters}
                        hidden={hideJobFacetResetButton}
                    ></lightning-button>
                </div>
            </div>
        </div>
        <template lwc:if={showFilteredJobEmpty}>
            <div
                class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-text-body_regular slds-p-vertical_medium">
                <lightning-icon class="slds-m-right_x-small" icon-name="utility:list" alternative-text=""
                    size="small"></lightning-icon>
                <lightning-formatted-text value={filteredJobsEmptyMessage}></lightning-formatted-text>
            </div>
        </template>
        <template lwc:else>
            <div class="merge-datatable-room">
                <lightning-datatable
                    key-field="Id"
                    data={_filteredMergeJobs}
                    columns={_columns}
                    selected-rows={_selectedMergeJob}
                    max-row-selection="1"
                    onrowselection={handleMergeJobSelected}
                    onrowaction={handleRowAction}
                >
                </lightning-datatable>
            </div>
        </template>
    </template>
</template>
