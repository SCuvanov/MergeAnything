<template>
    <template lwc:if={showJobLoading}>
        <div class="slds-is-relative slds-p-vertical_large">
            <lightning-spinner alternative-text="Loading merge jobs" size="small"></lightning-spinner>
        </div>
    </template>
    <template lwc:elseif={showJobError}>
        <div class="slds-text-color_error slds-p-around_medium">Unable to load merge jobs.</div>
    </template>
    <template lwc:elseif={showNoJobsAtAll}>
        <div
            class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-text-body_regular slds-p-vertical_large">
            <lightning-icon class="slds-m-right_x-small" icon-name="utility:list" alternative-text=""
                size="small"></lightning-icon>
            <lightning-formatted-text value={emptyJobMessage}></lightning-formatted-text>
        </div>
    </template>
    <template lwc:else>
        <div class="merge-job-toolbar slds-m-bottom_small">
            <div class="merge-job-toolbar__showme">
                <slot name="mergeViewPicker"></slot>
            </div>
            <div class="slds-grid slds-wrap slds-grid_vertical-align-end merge-job-toolbar__filters">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_3-of-12">
                    <lightning-combobox
                        label="Created by"
                        value={_jobCreatedByFilter}
                        options={creatorFilterOptions}
                        onchange={handleCreatorFilterChange}
                    ></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_3-of-12">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="merge-job-created-after">Created on or after</label>
                        <div class="slds-form-element__control">
                            <input
                                id="merge-job-created-after"
                                type="date"
                                class="slds-input"
                                value={_jobDateFrom}
                                onchange={handleJobDateFromChangeNative}
                            />
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_3-of-12">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="merge-job-created-before">Created on or before</label>
                        <div class="slds-form-element__control">
                            <input
                                id="merge-job-created-before"
                                type="date"
                                class="slds-input"
                                value={_jobDateTo}
                                onchange={handleJobDateToChangeNative}
                            />
                        </div>
                    </div>
                </div>
                <div
                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_3-of-12 slds-align-bottom"
                >
                    <lightning-button
                        variant="neutral"
                        label="Reset filters"
                        title="Clear created by and date filters"
                        icon-name="utility:clear"
                        onclick={handleResetJobFilters}
                        disabled={jobFiltersResetDisabled}
                    ></lightning-button>
                </div>
            </div>
        </div>
        <template lwc:if={showFilteredJobEmpty}>
            <div
                class="slds-grid slds-grid_align-center slds-grid_vertical-align-center slds-text-body_regular slds-p-vertical_medium">
                <lightning-icon class="slds-m-right_x-small" icon-name="utility:list" alternative-text=""
                    size="small"></lightning-icon>
                <lightning-formatted-text value={emptyJobMessage}></lightning-formatted-text>
            </div>
        </template>
        <template lwc:else>
            <div class="merge-datatable-room">
                <lightning-datatable
                    key-field="Id"
                    data={_filteredMergeJobs}
                    columns={_columns}
                    selected-rows={_selectedMergeJob}
                    max-row-selection="1"
                    onrowselection={handleMergeJobSelected}
                    onrowaction={handleRowAction}
                >
                </lightning-datatable>
            </div>
        </template>
    </template>
</template>
