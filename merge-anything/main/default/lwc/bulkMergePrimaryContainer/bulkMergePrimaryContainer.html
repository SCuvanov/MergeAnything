<template>
  <lightning-card>
    <div class="slds-m-left_medium slds-m-right_medium">
      <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-end">
        <div class="slds-col">
          <lightning-radio-group name="radioGroup" options={_mergeOptions} value={_mergeOption} type="button"
            onchange={handleMergeOption}>
          </lightning-radio-group>
        </div>
        <div class="slds-col">
          <lightning-button data-id="newMergeJobBtn" variant="neutral" label="New Merge Job" title="New Merge Job"
            icon-name="utility:add" onclick={handleNewMergeJob} hidden={hideNewMergeJobButton}></lightning-button>
          <lightning-button data-id="newMergeItemBtn" variant="neutral" label="New Merge Item"
            title="New Merge Item (not available for completed jobs)" icon-name="utility:add"
            onclick={handleNewMergeItem} hidden={hideNewMergeItemButton}></lightning-button>
        </div>
      </div>

      <template lwc:if={_mergeJob}>
        <template lwc:if={showMergeJobListSection}>
          <div class="slds-m-top_medium">
            <c-merge-job-list record-id={recordId} merge-view={_mergeView}
              onmergejobselected={handleMergeJobSelected} onmergeitemsinvalidated={forwardMergeItemsInvalidated}>
              <lightning-combobox slot="mergeViewPicker" name="merge_views" label="Show Me" value={_mergeView}
                placeholder="Select View" options={_mergeViews} onchange={handleMergeView}>
              </lightning-combobox>
            </c-merge-job-list>
          </div>
        </template>
        <template lwc:if={showMergeItemListSection}>
          <div class="slds-m-top_medium item-filter-toolbar">
            <div class="item-filter-toolbar__row">
              <div class="item-filter-toolbar__segment">
                <div class="item-filter-toolbar__showme">
                  <lightning-combobox name="merge_views" label="Show Me" value={_mergeView} placeholder="Select View"
                    options={_mergeViews} onchange={handleMergeView}>
                  </lightning-combobox>
                </div>
              </div>
              <div class="item-filter-toolbar__segment">
                <div class="item-filter-toolbar__object">
                  <lightning-input
                    label="Filter by record object (contains)"
                    value={_itemObjectFilter}
                    onchange={handleItemObjectFilterInput}
                  ></lightning-input>
                </div>
              </div>
              <div class="item-filter-toolbar__segment">
                <div class="item-filter-toolbar__errors">
                  <lightning-input
                    type="checkbox"
                    label="Errors only"
                    title="Failed status or merge error text"
                    checked={_itemErrorsOnly}
                    onchange={handleItemErrorsOnlyChange}
                  ></lightning-input>
                </div>
              </div>
              <div class="item-filter-toolbar__segment item-filter-toolbar__segment--reset">
                <lightning-button
                  variant="neutral"
                  label="Reset filters"
                  title="Clear object filter and errors-only"
                  icon-name="utility:clear"
                  class="item-filter-toolbar__reset-filters"
                  onclick={handleResetItemFilters}
                  hidden={hideItemFacetResetButton}
                ></lightning-button>
              </div>
            </div>
          </div>
          <div class="slds-m-top_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-end">
            <c-merge-item-list
              record-id={recordId}
              merge-view={_mergeView}
              item-object-filter={_itemObjectFilter}
              item-errors-only={_itemErrorsOnly}
              onmergeitemsinvalidated={forwardMergeItemsInvalidated}
            ></c-merge-item-list>
          </div>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
